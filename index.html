<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Jornada de Sofia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/kaboom/3000.1.17/kaboom.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,600;1,300&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink:    #ff3fa4;
    --cyan:    #00f5ff;
    --gold:    #ffd700;
    --red:     #ff2244;
    --dark:    #07090f;
    --panel:   rgba(0,0,0,0.72);
    --glow-pink: 0 0 18px #ff3fa4, 0 0 40px #ff3fa4aa;
    --glow-cyan: 0 0 18px #00f5ff, 0 0 40px #00f5ffaa;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
  }

  /* ── LOADING SCREEN ─────────────────────────────── */
  #loading-screen {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }

  .load-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    color: var(--pink);
    text-shadow: var(--glow-pink);
    letter-spacing: 4px;
    animation: pulse-title 1.4s ease-in-out infinite alternate;
  }
  .load-sub {
    color: #ffffff88;
    font-size: 14px;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 10px;
    font-weight: 300;
  }
  .load-bar-wrap {
    margin-top: 48px;
    width: min(400px, 80vw);
    height: 4px;
    background: #ffffff18;
    border-radius: 4px;
    overflow: hidden;
  }
  .load-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    border-radius: 4px;
    transition: width 0.3s ease;
    box-shadow: 0 0 12px var(--cyan);
  }
  .load-status {
    margin-top: 14px;
    color: #ffffff44;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    height: 16px;
  }

  @keyframes pulse-title {
    from { text-shadow: 0 0 10px #ff3fa4; }
    to   { text-shadow: 0 0 30px #ff3fa4, 0 0 60px #ff3fa4aa; }
  }

  /* ── GAME CONTAINER ─────────────────────────────── */
  #game-container {
    position: relative;
    width: 1280px; height: 720px;
    max-width: 100vw;
    max-height: calc(100vw * 0.5625);
  }
  #game-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }

  /* ── HUD OVERLAY ────────────────────────────────── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
  }
  .hud-block {
    background: var(--panel);
    border: 1px solid #ffffff15;
    border-radius: 10px;
    padding: 10px 18px;
    backdrop-filter: blur(12px);
  }
  .hud-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: #ffffff44;
    text-transform: uppercase;
  }
  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-top: 2px;
  }
  .hud-value.pink { color: var(--pink); text-shadow: var(--glow-pink); }
  .hud-value.cyan { color: var(--cyan); text-shadow: var(--glow-cyan); }
  .hud-value.gold { color: var(--gold); text-shadow: 0 0 12px var(--gold); }

  #hud-lives-icons { display: flex; gap: 6px; margin-top: 4px; }
  .heart {
    font-size: 18px;
    filter: drop-shadow(0 0 6px var(--pink));
    transition: transform 0.2s, opacity 0.2s;
  }
  .heart.empty { opacity: 0.2; filter: none; }

  /* power meter */
  #power-bar-wrap {
    width: 160px;
    height: 6px;
    background: #ffffff15;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 6px;
  }
  #power-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    border-radius: 6px;
    box-shadow: 0 0 8px var(--pink);
    transition: width 0.25s ease;
  }

  /* ── POWER FLASH ────────────────────────────────── */
  #flash {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 20;
    border-radius: 0;
    opacity: 0;
    background: radial-gradient(ellipse at center, #ff3fa455 0%, transparent 70%);
    transition: opacity 0.08s;
  }
  #flash.active { opacity: 1; }

  /* ── COMBO POPUP ────────────────────────────────── */
  #combo-popup {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px var(--gold), 0 0 60px #ffd70066;
    pointer-events: none;
    z-index: 30;
    transition: transform 0.15s cubic-bezier(.4,2,.6,1), opacity 0.4s ease;
    opacity: 0;
    white-space: nowrap;
  }
  #combo-popup.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* ── SKILL INDICATOR ────────────────────────────── */
  #skill-indicator {
    position: absolute;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 8px;
    pointer-events: none; z-index: 10;
  }
  .skill-pill {
    background: var(--panel);
    border: 1px solid #ffffff15;
    border-radius: 50px;
    padding: 7px 16px;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(8px);
    transition: border-color 0.3s, box-shadow 0.3s;
    font-size: 13px;
    color: #ffffffcc;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .skill-pill.ready {
    border-color: var(--pink);
    box-shadow: 0 0 12px #ff3fa466;
  }
  .skill-key {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: #ffffff18;
    border: 1px solid #ffffff30;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
  }
  .skill-key.active {
    background: var(--pink);
    border-color: var(--pink);
    box-shadow: 0 0 10px var(--pink);
  }

  /* ── VIGNETTE ───────────────────────────────────── */
  #vignette {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 60%, #00000088 100%);
  }
  #vignette.damaged {
    background: radial-gradient(ellipse at center, transparent 40%, #ff000055 100%);
    animation: damage-pulse 0.4s ease forwards;
  }
  @keyframes damage-pulse {
    0%   { opacity: 0; }
    30%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── BOSS BAR ───────────────────────────────────── */
  #boss-bar-container {
    position: absolute;
    bottom: 60px; left: 50%; transform: translateX(-50%);
    width: min(600px, 80vw);
    pointer-events: none; z-index: 10;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #boss-bar-container.visible { opacity: 1; }
  .boss-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--red);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 10px var(--red);
  }
  .boss-bar-bg {
    height: 10px;
    background: #ffffff15;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ff224433;
  }
  #boss-bar-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--red), #ff8800);
    border-radius: 10px;
    box-shadow: 0 0 10px var(--red);
    transition: width 0.4s ease;
  }

  /* ── PHASE BANNER ───────────────────────────────── */
  #phase-banner {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none; z-index: 25;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #phase-banner.show { opacity: 1; }
  #phase-banner .phase-number {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    text-transform: uppercase;
  }
  #phase-banner .phase-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 4vw, 48px);
    font-weight: 900;
    color: #fff;
    margin-top: 4px;
    text-shadow: 0 0 20px #ffffff66;
  }
  .phase-line {
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 10px auto;
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="load-title">A JORNADA DE SOFIA</div>
  <div class="load-sub">Uma história de amor em pixels</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-status" id="load-status">Inicializando motor…</div>
</div>

<!-- GAME WRAPPER -->
<div id="game-container">

  <!-- HUD overlay (atualizado via JS) -->
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Vidas</div>
      <div id="hud-lives-icons">
        <span class="heart" id="h1">♥</span>
        <span class="heart" id="h2">♥</span>
        <span class="heart" id="h3">♥</span>
      </div>
    </div>

    <div class="hud-block" style="text-align:center">
      <div class="hud-label">Fase</div>
      <div class="hud-value cyan" id="hud-phase">— — —</div>
    </div>

    <div class="hud-block" style="text-align:right">
      <div class="hud-label">Lembranças</div>
      <div class="hud-value gold" id="hud-mem">0 / 0</div>
      <div class="hud-label" style="margin-top:8px">Poder</div>
      <div id="power-bar-wrap"><div id="power-bar"></div></div>
    </div>
  </div>

  <!-- Effects -->
  <div id="vignette"></div>
  <div id="flash"></div>

  <!-- Combo popup -->
  <div id="combo-popup">COMBO!</div>

  <!-- Skill pills (bottom-right) -->
  <div id="skill-indicator">
    <div class="skill-pill" id="skill-x">
      <div class="skill-key" id="key-x">X</div>
      <span>PULSO DE ENERGIA</span>
    </div>
    <div class="skill-pill" id="skill-z">
      <div class="skill-key" id="key-z">Z</div>
      <span>ESCUDO</span>
    </div>
  </div>

  <!-- Boss HP bar -->
  <div id="boss-bar-container">
    <div class="boss-name" id="boss-name-label">GUARDIÃO DAS SOMBRAS</div>
    <div class="boss-bar-bg"><div id="boss-bar-fill"></div></div>
  </div>

  <!-- Phase banner -->
  <div id="phase-banner">
    <div class="phase-number" id="pb-num">FASE 1</div>
    <div class="phase-line"></div>
    <div class="phase-title" id="pb-title">Pelotas</div>
    <div class="phase-line"></div>
  </div>

</div><!-- /game-container -->

<script src="game.js"></script>
</body>
</html>
